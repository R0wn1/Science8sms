<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 8 Optics Flashcards</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#070d1a;
  color:#e2e8f0;
  margin:0;
  padding:2rem;
}

.container { max-width:900px; margin:auto; }

.title { text-align:center; font-size:2rem; margin-bottom:1rem; }

.filters {
  display:flex; justify-content:center; gap:10px; margin-bottom:1rem;
}

button {
  padding:8px 14px;
  border-radius:8px;
  border:1px solid #334155;
  background:#111827;
  color:white;
  cursor:pointer;
}

button.active { background:#2563eb; }

.card {
  background:#111827;
  padding:2rem;
  border-radius:12px;
  text-align:center;
  min-height:260px;
  cursor:pointer;
  border:1px solid #1f2937;
}

.diagram {
  margin-top:1rem;
}

.controls {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:1rem;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">Grade 8 Optics Flashcards</div>

  <div class="filters">
    <button class="active" onclick="filter('all',this)">All</button>
    <button onclick="filter('5.1',this)">Reflection</button>
    <button onclick="filter('5.2',this)">Refraction</button>
  </div>

  <div class="card" id="card" onclick="flip()"></div>

  <div class="controls">
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
  </div>
</div>

<script>

const allCards = [
  // ───── REFLECTION ─────
  {
    s:"5.1",
    q:"What is the Law of Reflection?",
    a:"Angle of incidence equals angle of reflection.",
    d:`<svg viewBox="0 0 300 140">
      <line x1="150" y1="20" x2="150" y2="120" stroke="#60a5fa"/>
      <line x1="50" y1="50" x2="150" y2="80" stroke="white"/>
      <line x1="150" y1="80" x2="250" y2="50" stroke="white"/>
    </svg>`
  },

  {
    s:"5.1",
    q:"What is the normal?",
    a:"An imaginary line perpendicular to the surface.",
    d:`<svg viewBox="0 0 300 140">
      <line x1="150" y1="20" x2="150" y2="120" stroke="#60a5fa"/>
      <line x1="50" y1="80" x2="250" y2="80" stroke="white"/>
    </svg>`
  },

  {
    s:"5.1",
    q:"What is specular reflection?",
    a:"Reflection from a smooth surface producing a clear image."
  },

  {
    s:"5.1",
    q:"What is diffuse reflection?",
    a:"Reflection from a rough surface scattering light in many directions."
  },

  {
    s:"5.1",
    q:"Plane mirror image characteristics",
    a:"Same size, upright, virtual, same distance behind mirror."
  },

  // ───── REFRACTION ─────
  {
    s:"5.2",
    q:"What is refraction?",
    a:"Bending of light when it moves between different materials.",
    d:`<svg viewBox="0 0 300 140">
      <line x1="150" y1="0" x2="150" y2="140" stroke="#3b82f6"/>
      <line x1="60" y1="40" x2="150" y2="70" stroke="white"/>
      <line x1="150" y1="70" x2="240" y2="110" stroke="#60a5fa"/>
    </svg>`
  },

  {
    s:"5.2",
    q:"What happens when light enters a more dense medium?",
    a:"It slows down and bends toward the normal."
  },

  {
    s:"5.2",
    q:"What happens when light enters a less dense medium?",
    a:"It speeds up and bends away from the normal."
  },

  {
    s:"5.2",
    q:"Bent stick effect",
    a:"Light refracts at water-air boundary making objects appear shifted."
  }
];

let index = 0;
let flipped = false;
let filtered = [...allCards];

function render(){
  const c = filtered[index];
  document.getElementById("card").innerHTML = flipped
    ? `<h2>Answer</h2><p>${c.a}</p>`
    : `<h2>Question</h2><p>${c.q}</p>` + (c.d ? `<div class="diagram">${c.d}</div>` : "");
}

function flip(){ flipped = !flipped; render(); }

function next(){
  index = (index + 1) % filtered.length;
  flipped = false;
  render();
}

function prev(){
  index = (index - 1 + filtered.length) % filtered.length;
  flipped = false;
  render();
}

function filter(type,btn){
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  filtered = type === "all" ? allCards : allCards.filter(c=>c.s===type);
  index = 0;
  flipped = false;
  render();
}

render();

</script>

</body>
</html>
